# Phase 1 — centralized TB classifier config.
# Paths assume Google Colab with the datasets in Google Drive. Override as needed.

seed: 42
device: cuda            # "cuda" on Colab GPU, "cpu" locally

paths:
  # Root of the raw datasets (each is a folder with CXR_png/ + ClinicalReadings/).
  data_root: /content/drive/MyDrive/tb-fl/data/raw
  montgomery: /content/drive/MyDrive/tb-fl/data/raw/montgomery   # MontgomerySet
  shenzhen:   /content/drive/MyDrive/tb-fl/data/raw/shenzhen     # ChinaSet_AllFiles
  # Outputs.
  demographics_csv: /content/drive/MyDrive/tb-fl/data/processed/demographics.csv
  out_dir: /content/drive/MyDrive/tb-fl/experiments/runs/ex000_centralized

data:
  datasets: [shenzhen, montgomery]   # which sources to include
  image_size: 224
  val_frac: 0.15
  test_frac: 0.15
  num_workers: 2
  # Age bands (years) for subgroup fairness analysis.
  age_bands: [0, 30, 45, 60, 200]

model:
  arch: densenet121        # densenet121 | resnet50
  pretrained: true
  num_classes: 2

train:
  epochs: 25
  batch_size: 32
  lr: 0.0001
  weight_decay: 0.0001
  optimizer: adam
  # Class imbalance handling (TB-positive is the minority on Montgomery).
  use_class_weights: true
  early_stop_patience: 6

eval:
  # Sensitive attributes to report subgroup gaps for.
  sensitive_attrs: [sex, age_band]

multiseed:
  # run_multiseed.py runs these seeds and reports mean +/- 95% CI.
  # 5 seeds = the project rigor target (tighter CIs on small fairness subgroups).
  seeds: [0, 1, 2, 3, 4]
  exp_name: ex001_centralized_5seed
