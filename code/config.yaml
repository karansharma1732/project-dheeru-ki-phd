# Experiment Configuration
experiment:
  name: "federated_cxr_sputum"
  seed: 42
  device: "cuda"  # or "cpu"
  output_dir: "./results"

# Data Configuration
data:
  dataset_type: "cxr"  # or "sputum"
  data_dir: "./data/raw"
  image_size: [224, 224]
  num_classes: 2  # binary classification
  train_split: 0.8
  val_split: 0.1
  test_split: 0.1

# Federated Learning Configuration
federated:
  num_clients: 10
  num_rounds: 100
  local_epochs: 5
  batch_size: 32
  learning_rate: 0.001
  
  # Data partitioning
  partition_strategy: "non_iid_label_skew"  # iid, non_iid_label_skew, non_iid_quantity_skew
  alpha: 0.5  # Dirichlet parameter for non-IID partitioning
  
  # Aggregation
  aggregation_method: "fedavg"  # fedavg, fedprox, weighted_avg
  
  # Client selection
  client_fraction: 1.0  # Fraction of clients participating per round
  
# Model Configuration
model:
  architecture: "resnet18"  # resnet18, resnet50, efficientnet_b0, custom_cnn
  pretrained: true
  freeze_backbone: false

# Training Configuration
training:
  optimizer: "adam"
  weight_decay: 0.0001
  momentum: 0.9
  lr_scheduler: "step"  # step, cosine, none
  lr_step_size: 30
  lr_gamma: 0.1

# Evaluation Configuration
evaluation:
  metrics: ["accuracy", "auc", "f1", "precision", "recall"]
  eval_frequency: 1  # Evaluate every N rounds